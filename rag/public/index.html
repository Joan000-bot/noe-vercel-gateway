<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Noe</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,700;1,400&family=Cormorant+Garamond:ital,wght@0,300;0,400;0,600;1,300;1,400&family=Noto+Serif+SC:wght@300;400;600&display=swap" rel="stylesheet">
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
:root {
  --bg: #0a0a0a; --surface: #141414; --surface2: #1e1e1e; --border: #2a2a2a;
  --text: #e8e8e8; --text2: #888; --accent: #c4a0ff; --accent2: #a07ae0;
  --think: #2a2a1e; --think-border: #4a4a2e;
  --bubble-user: rgba(160,122,224,0.85); --bubble-ai: rgba(30,30,30,0.85);
  --chat-bg: none;
  --font-display: 'Playfair Display', 'Noto Serif SC', serif;
  --font-body: 'Cormorant Garamond', 'Noto Serif SC', serif;
}
body { font-family: var(--font-body); background: var(--bg); color: var(--text); height: 100vh; display: flex; font-size: 15px; }

/* Sidebar */
.sidebar { width: 300px; background: var(--surface); border-right: 1px solid var(--border); display: flex; flex-direction: column; flex-shrink: 0; overflow-y: auto; }
.sidebar::-webkit-scrollbar { width: 4px; }
.sidebar::-webkit-scrollbar-thumb { background: var(--border); border-radius: 2px; }
.ss { padding: 14px 16px; border-bottom: 1px solid var(--border); }
.ss h2 { font-family: var(--font-display); font-size: 11px; color: var(--text2); text-transform: uppercase; letter-spacing: 2px; margin-bottom: 10px; font-weight: 400; }
select, .ss input[type="text"], .ss input[type="url"] { width: 100%; padding: 7px 10px; background: var(--surface2); border: 1px solid var(--border); border-radius: 8px; color: var(--text); font-size: 13px; font-family: var(--font-body); outline: none; }
select:focus, .ss input:focus { border-color: var(--accent); }

/* Slider */
.slider-wrap { margin-top: 8px; }
.slider-wrap label { display: flex; justify-content: space-between; font-size: 12px; color: var(--text2); margin-bottom: 4px; }
.slider-wrap label span { color: var(--accent); }
input[type="range"] { width: 100%; -webkit-appearance: none; height: 3px; background: var(--border); border-radius: 2px; outline: none; }
input[type="range"]::-webkit-slider-thumb { -webkit-appearance: none; width: 14px; height: 14px; background: var(--accent); border-radius: 50%; cursor: pointer; }

/* Theme controls */
.color-row { display: flex; gap: 6px; align-items: center; margin-top: 6px; }
.color-row label { font-size: 11px; color: var(--text2); width: 60px; flex-shrink: 0; }
.color-row input[type="color"] { width: 28px; height: 28px; border: 1px solid var(--border); border-radius: 6px; background: none; cursor: pointer; padding: 0; }
.color-row input[type="range"] { flex: 1; }
.bg-input { display: flex; gap: 6px; margin-top: 6px; align-items: center; }
.bg-input input[type="text"] { flex: 1; }
.bg-input button, .bg-input label { padding: 6px 10px; background: var(--surface2); border: 1px solid var(--border); border-radius: 8px; color: var(--text); font-size: 11px; cursor: pointer; text-align: center; }
.bg-input label:hover { border-color: var(--accent); color: var(--accent); }

/* Voice */
.voice-row { display: flex; gap: 6px; align-items: center; margin-top: 6px; }
.voice-row select { flex: 1; }
.icon-btn { padding: 7px 10px; background: var(--surface2); border: 1px solid var(--border); border-radius: 8px; color: var(--text2); font-size: 16px; cursor: pointer; transition: all 0.2s; flex-shrink: 0; }
.icon-btn.active { border-color: var(--accent); color: var(--accent); background: rgba(192,160,255,0.08); }

/* Auto msg */
.auto-row { display: flex; gap: 6px; align-items: center; }
.auto-row input { flex: 1; }
.auto-row select { width: 60px; flex-shrink: 0; }
.auto-btn { width: 100%; padding: 7px; border-radius: 8px; border: 1px solid var(--border); background: var(--surface2); color: var(--text); font-size: 12px; cursor: pointer; margin-top: 6px; font-family: var(--font-body); }
.auto-btn.running { border-color: #f66; color: #f66; }
.auto-status { font-size: 11px; color: var(--text2); margin-top: 4px; }

/* Music player */
.music-url-row { display: flex; gap: 6px; }
.music-url-row input { flex: 1; }
.music-url-row button { padding: 6px 12px; background: var(--accent2); border: none; border-radius: 8px; color: #fff; font-size: 12px; cursor: pointer; }
.playlist-list { max-height: 150px; overflow-y: auto; margin-top: 8px; }
.pl-item { display: flex; align-items: center; gap: 6px; padding: 6px 8px; background: var(--surface2); border-radius: 6px; margin-bottom: 4px; font-size: 12px; cursor: pointer; }
.pl-item:hover { background: rgba(192,160,255,0.1); }
.pl-item .pl-title { flex: 1; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
.pl-item .pl-del { background: none; border: none; color: #666; cursor: pointer; font-size: 12px; }
.pl-item .pl-del:hover { color: #f66; }
.pl-count { font-size: 11px; color: var(--text2); margin-top: 4px; }
.now-playing { font-size: 12px; color: var(--accent); margin-top: 6px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }

/* Doc list */
.doc-list { max-height: 140px; overflow-y: auto; }
.doc-item { display: flex; align-items: center; padding: 6px 8px; background: var(--surface2); border-radius: 6px; margin-bottom: 4px; font-size: 12px; }
.doc-item .source { flex: 1; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; color: var(--text2); }
.doc-item .chunks { color: var(--accent); font-size: 11px; margin: 0 6px; }
.doc-item .del { background: none; border: none; color: #666; cursor: pointer; font-size: 14px; }
.doc-btns { display: flex; gap: 6px; margin-top: 6px; }
.doc-btns button { flex: 1; padding: 7px; background: var(--surface2); border: 1px solid var(--border); border-radius: 8px; color: var(--text); font-size: 12px; cursor: pointer; font-family: var(--font-body); }
.doc-btns button:hover { border-color: var(--accent); color: var(--accent); }

/* Chat area */
.chat-area { flex: 1; display: flex; flex-direction: column; min-width: 0; position: relative; }
.chat-bg { position: absolute; inset: 0; background-size: cover; background-position: center; opacity: 0.15; pointer-events: none; z-index: 0; }
.chat-header { padding: 12px 24px; border-bottom: 1px solid var(--border); display: flex; align-items: center; gap: 12px; z-index: 1; position: relative; }
.chat-header .logo { font-family: var(--font-display); font-size: 26px; font-weight: 700; color: var(--accent); font-style: italic; letter-spacing: 2px; }

/* Music corner */
.music-corner { position: absolute; top: 10px; right: 16px; z-index: 2; }
.music-corner button { background: var(--surface2); border: 1px solid var(--border); border-radius: 10px; padding: 6px 14px; color: var(--text2); font-size: 13px; cursor: pointer; font-family: var(--font-body); display: flex; align-items: center; gap: 6px; }
.music-corner button:hover { border-color: var(--accent); color: var(--accent); }
.music-corner .playing-text { max-width: 160px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; font-size: 11px; color: var(--accent); }

/* Messages */
.messages { flex: 1; overflow-y: auto; padding: 24px; z-index: 1; position: relative; }
.messages::-webkit-scrollbar { width: 4px; }
.messages::-webkit-scrollbar-thumb { background: var(--border); border-radius: 2px; }
.message { max-width: 720px; margin: 0 auto 20px; display: flex; gap: 10px; }
.message.user { justify-content: flex-end; }
.avatar { width: 36px; height: 36px; border-radius: 50%; flex-shrink: 0; object-fit: cover; cursor: pointer; background: var(--surface2); display: flex; align-items: center; justify-content: center; font-size: 14px; overflow: hidden; }
.avatar img { width: 100%; height: 100%; object-fit: cover; }
.message.user .msg-content { display: flex; flex-direction: column; align-items: flex-end; }
.message.assistant .msg-content { display: flex; flex-direction: column; align-items: flex-start; }
.bubble { padding: 12px 18px; line-height: 1.7; max-width: 85%; font-family: var(--font-body); font-size: 15px; }
.message.user .bubble { background: var(--bubble-user); color: #fff; border-radius: 18px 18px 4px 18px; backdrop-filter: blur(8px); }
.message.assistant .bubble { background: var(--bubble-ai); border-radius: 18px 18px 18px 4px; backdrop-filter: blur(8px); }
.thinking-block { background: var(--think); border: 1px solid var(--think-border); border-radius: 12px; padding: 10px 14px; margin-bottom: 6px; font-size: 12px; color: #b0a870; line-height: 1.6; max-height: 180px; overflow-y: auto; cursor: pointer; position: relative; max-width: 85%; }
.thinking-block.collapsed { max-height: 36px; overflow: hidden; }
.thinking-block::before { content: "thinking"; font-size: 9px; text-transform: uppercase; letter-spacing: 2px; color: #8a8050; display: block; margin-bottom: 3px; font-family: var(--font-display); }
.thinking-block.collapsed::after { content: ""; position: absolute; bottom: 0; left: 0; right: 0; height: 16px; background: linear-gradient(transparent, var(--think)); }
.sources { font-size: 11px; color: var(--text2); margin-top: 6px; padding: 6px 10px; background: rgba(20,20,20,0.6); border-radius: 6px; }
.sources span { color: var(--accent); }
.voice-btn { background: none; border: 1px solid var(--border); border-radius: 6px; padding: 3px 10px; font-size: 11px; color: var(--text2); cursor: pointer; margin-top: 4px; font-family: var(--font-body); }
.voice-btn:hover, .voice-btn.playing { border-color: var(--accent); color: var(--accent); }

/* Input */
.input-area { padding: 14px 24px; border-top: 1px solid var(--border); z-index: 1; position: relative; }
.input-wrap { max-width: 720px; margin: 0 auto; display: flex; gap: 10px; }
.input-wrap textarea { flex: 1; padding: 12px 16px; background: var(--surface2); border: 1px solid var(--border); border-radius: 12px; color: var(--text); font-size: 14px; font-family: var(--font-body); resize: none; outline: none; height: 48px; max-height: 150px; }
.input-wrap textarea:focus { border-color: var(--accent); }
.input-wrap button { padding: 0 18px; background: var(--accent2); border: none; border-radius: 12px; color: #fff; font-size: 14px; cursor: pointer; font-family: var(--font-display); letter-spacing: 1px; }
.input-wrap button:disabled { opacity: 0.4; }

/* Modal */
.modal-overlay { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.6); z-index: 100; align-items: center; justify-content: center; }
.modal-overlay.active { display: flex; }
.modal { background: var(--surface); border: 1px solid var(--border); border-radius: 16px; padding: 24px; width: 420px; max-width: 90vw; }
.modal h3 { margin-bottom: 14px; font-family: var(--font-display); font-weight: 400; font-size: 18px; }
.modal input, .modal textarea { width: 100%; padding: 10px 14px; background: var(--surface2); border: 1px solid var(--border); border-radius: 8px; color: var(--text); font-size: 13px; font-family: var(--font-body); outline: none; margin-bottom: 10px; }
.modal textarea { height: 160px; resize: vertical; }
.modal-btns { display: flex; gap: 8px; justify-content: flex-end; }
.modal-btns button { padding: 8px 20px; border-radius: 8px; border: 1px solid var(--border); background: var(--surface2); color: var(--text); cursor: pointer; font-family: var(--font-body); }
.modal-btns .primary { background: var(--accent2); border-color: var(--accent2); color: #fff; }

/* Markdown */
.bubble p { margin-bottom: 6px; }
.bubble code { background: rgba(0,0,0,0.3); padding: 2px 5px; border-radius: 3px; font-size: 12px; font-family: monospace; }
.bubble pre { background: rgba(0,0,0,0.3); padding: 10px; border-radius: 8px; overflow-x: auto; margin: 6px 0; }
.bubble pre code { background: none; padding: 0; }

/* Hidden file input */
.hidden { display: none; }

@media (max-width: 768px) {
  .sidebar { display: none; }
  .music-corner .playing-text { max-width: 100px; }
}
</style>
</head>
<body>

<div class="sidebar">
  <!-- Model -->
  <div class="ss">
    <h2>Model</h2>
    <select id="modelSelect"></select>
    <div class="slider-wrap">
      <label>Thinking <span id="thinkingLabel">Off</span></label>
      <input type="range" id="thinkingSlider" min="0" max="32000" step="1000" value="0" oninput="updateThinkingLabel()">
    </div>
  </div>

  <!-- Theme -->
  <div class="ss">
    <h2>Theme</h2>
    <div class="color-row">
      <label>Accent</label>
      <input type="color" id="themeAccent" value="#c4a0ff" onchange="applyTheme()">
    </div>
    <div class="color-row">
      <label>Background</label>
      <input type="color" id="themeBg" value="#0a0a0a" onchange="applyTheme()">
    </div>
    <div class="color-row">
      <label>Bubble</label>
      <input type="range" id="bubbleAlpha" min="0" max="100" value="85" oninput="applyTheme()">
      <span style="font-size:11px;color:var(--text2)" id="alphaLabel">85%</span>
    </div>
    <div class="bg-input">
      <input type="text" id="chatBgUrl" placeholder="Background URL...">
      <button onclick="applyTheme()">Set</button>
      <label for="chatBgFile">Upload</label>
      <input type="file" id="chatBgFile" class="hidden" accept="image/*" onchange="uploadChatBg(this)">
    </div>
    <div class="bg-input" style="margin-top:4px">
      <button onclick="clearChatBg()" style="flex:1;font-size:11px">Clear Background</button>
    </div>
  </div>

  <!-- Avatars -->
  <div class="ss">
    <h2>Avatars</h2>
    <div style="display:flex;gap:12px;align-items:center;">
      <div style="text-align:center">
        <div class="avatar" id="noeAvatarPreview" onclick="document.getElementById('noeAvatarInput').click()" title="Noe avatar">N</div>
        <div style="font-size:10px;color:var(--text2);margin-top:2px">Noe</div>
      </div>
      <div style="text-align:center">
        <div class="avatar" id="viAvatarPreview" onclick="document.getElementById('viAvatarInput').click()" title="Virael avatar">V</div>
        <div style="font-size:10px;color:var(--text2);margin-top:2px">Virael</div>
      </div>
    </div>
    <input type="file" id="noeAvatarInput" class="hidden" accept="image/*" onchange="setAvatar('noe',this)">
    <input type="file" id="viAvatarInput" class="hidden" accept="image/*" onchange="setAvatar('vi',this)">
  </div>

  <!-- Voice -->
  <div class="ss">
    <h2>Voice</h2>
    <div class="voice-row">
      <select id="voiceSelect"><option value="">Loading...</option></select>
      <button class="icon-btn" id="voiceToggle" onclick="toggleVoice()" title="Auto-read">&#9834;</button>
    </div>
  </div>

  <!-- Auto Message -->
  <div class="ss">
    <h2>Auto Message</h2>
    <div class="auto-row">
      <input type="text" id="autoMsg" placeholder="Message...">
      <select id="autoInterval">
        <option value="30">30s</option><option value="60" selected>1m</option><option value="300">5m</option><option value="600">10m</option><option value="3600">1h</option>
      </select>
    </div>
    <button class="auto-btn" id="autoBtn" onclick="toggleAuto()">Start</button>
    <div class="auto-status" id="autoStatus"></div>
  </div>

  <!-- Music -->
  <div class="ss">
    <h2>Listen Together</h2>
    <div class="music-url-row">
      <input type="url" id="musicUrl" placeholder="Paste music URL...">
      <button onclick="addMusic()">+</button>
    </div>
    <div class="now-playing" id="nowPlaying"></div>
    <div class="playlist-list" id="playlistList"></div>
    <div class="pl-count" id="plCount"></div>
  </div>

  <!-- Knowledge Base -->
  <div class="ss" style="flex:1;display:flex;flex-direction:column;min-height:0;">
    <h2>Knowledge Base</h2>
    <div class="doc-list" id="docList"></div>
    <div class="doc-btns">
      <button onclick="showModal('text')">+ Text</button>
      <button onclick="showModal('url')">+ URL</button>
    </div>
  </div>
</div>

<div class="chat-area">
  <div class="chat-bg" id="chatBg"></div>
  <div class="chat-header">
    <div class="logo">Noe</div>
    <div class="music-corner" id="musicCorner" style="display:none">
      <button onclick="toggleMusicPanel()">
        <span>&#9835;</span>
        <span class="playing-text" id="musicCornerText"></span>
      </button>
    </div>
  </div>
  <div class="messages" id="messages"></div>
  <div class="input-area">
    <div class="input-wrap">
      <textarea id="input" placeholder="Say something..." rows="1" onkeydown="if(event.key==='Enter'&&!event.shiftKey){event.preventDefault();send()}"></textarea>
      <button id="sendBtn" onclick="send()">Send</button>
    </div>
  </div>
</div>

<!-- Audio player (hidden) -->
<audio id="musicPlayer" onended="playNext()" style="display:none"></audio>

<!-- Text Modal -->
<div class="modal-overlay" id="textModal">
  <div class="modal">
    <h3>Add Text Document</h3>
    <input id="textSource" placeholder="Document name">
    <textarea id="textContent" placeholder="Paste text here..."></textarea>
    <div class="modal-btns">
      <button onclick="closeModals()">Cancel</button>
      <button class="primary" onclick="addText()">Add</button>
    </div>
  </div>
</div>

<!-- URL Modal -->
<div class="modal-overlay" id="urlModal">
  <div class="modal">
    <h3>Add URL Document</h3>
    <input id="urlInput" placeholder="https://...">
    <div class="modal-btns">
      <button onclick="closeModals()">Cancel</button>
      <button class="primary" onclick="addUrl()">Fetch</button>
    </div>
  </div>
</div>

<script>
var API = window.location.origin;
var chatHistory = [];
var sending = false;
var autoTimer = null;
var voiceEnabled = false;
var currentAudio = null;
var noeAvatar = null;
var viAvatar = null;
var playlist = [];
var playIndex = -1;

// --- Init ---
async function init() {
  loadSettings();
  var r = await fetch(API + "/api/models");
  var models = await r.json();
  var sel = document.getElementById("modelSelect");
  sel.innerHTML = "";
  models.forEach(function(m) {
    var opt = document.createElement("option");
    opt.value = m.id; opt.textContent = m.name;
    sel.appendChild(opt);
  });
  loadDocs();
  loadVoices();
  loadPlaylistUI();
}

// --- Settings persistence ---
function saveSettings() {
  var s = {
    accent: document.getElementById("themeAccent").value,
    bg: document.getElementById("themeBg").value,
    alpha: document.getElementById("bubbleAlpha").value,
    chatBg: document.getElementById("chatBgUrl").value,
    noeAvatar: noeAvatar,
    viAvatar: viAvatar
  };
  localStorage.setItem("noe-settings", JSON.stringify(s));
}
function loadSettings() {
  try {
    var s = JSON.parse(localStorage.getItem("noe-settings"));
    if (!s) return;
    if (s.accent) document.getElementById("themeAccent").value = s.accent;
    if (s.bg) document.getElementById("themeBg").value = s.bg;
    if (s.alpha) document.getElementById("bubbleAlpha").value = s.alpha;
    if (s.chatBg) document.getElementById("chatBgUrl").value = s.chatBg;
    if (s.noeAvatar) { noeAvatar = s.noeAvatar; document.getElementById("noeAvatarPreview").innerHTML = '<img src="'+noeAvatar+'">'; }
    if (s.viAvatar) { viAvatar = s.viAvatar; document.getElementById("viAvatarPreview").innerHTML = '<img src="'+viAvatar+'">'; }
    applyTheme();
  } catch {}
}

// --- Theme ---
function hexToRgb(hex) {
  var r = parseInt(hex.slice(1,3),16), g = parseInt(hex.slice(3,5),16), b = parseInt(hex.slice(5,7),16);
  return r+","+g+","+b;
}
function applyTheme() {
  var accent = document.getElementById("themeAccent").value;
  var bg = document.getElementById("themeBg").value;
  var alpha = parseInt(document.getElementById("bubbleAlpha").value) / 100;
  var chatBg = document.getElementById("chatBgUrl").value;
  document.getElementById("alphaLabel").textContent = Math.round(alpha*100) + "%";

  var ar = hexToRgb(accent);
  document.documentElement.style.setProperty("--accent", accent);
  document.documentElement.style.setProperty("--accent2", accent);
  document.documentElement.style.setProperty("--bg", bg);
  document.documentElement.style.setProperty("--bubble-user", "rgba("+ar+","+alpha+")");
  document.documentElement.style.setProperty("--bubble-ai", "rgba(30,30,30,"+alpha+")");

  var bgEl = document.getElementById("chatBg");
  if (chatBg) { bgEl.style.backgroundImage = 'url('+chatBg+')'; bgEl.style.opacity = '0.15'; }
  else { bgEl.style.backgroundImage = 'none'; }

  saveSettings();
}

// --- Chat background upload ---
function uploadChatBg(input) {
  var file = input.files[0];
  if (!file) return;
  var reader = new FileReader();
  reader.onload = function(e) {
    document.getElementById("chatBgUrl").value = e.target.result;
    applyTheme();
  };
  reader.readAsDataURL(file);
}
function clearChatBg() {
  document.getElementById("chatBgUrl").value = "";
  applyTheme();
}

// --- Avatars ---
function setAvatar(who, input) {
  var file = input.files[0];
  if (!file) return;
  var reader = new FileReader();
  reader.onload = function(e) {
    var url = e.target.result;
    if (who === "noe") { noeAvatar = url; document.getElementById("noeAvatarPreview").innerHTML = '<img src="'+url+'">'; }
    else { viAvatar = url; document.getElementById("viAvatarPreview").innerHTML = '<img src="'+url+'">'; }
    saveSettings();
  };
  reader.readAsDataURL(file);
}
function makeAvatar(who) {
  var div = document.createElement("div");
  div.className = "avatar";
  var src = who === "noe" ? noeAvatar : viAvatar;
  if (src) div.innerHTML = '<img src="'+src+'">';
  else div.textContent = who === "noe" ? "N" : "V";
  return div;
}

// --- Thinking ---
function updateThinkingLabel() {
  var val = parseInt(document.getElementById("thinkingSlider").value);
  document.getElementById("thinkingLabel").textContent = val === 0 ? "Off" : val < 1000 ? val+" tokens" : (val/1000)+"k";
}

// --- Voice ---
async function loadVoices() {
  try {
    var r = await fetch(API + "/api/voices");
    var voices = await r.json();
    var sel = document.getElementById("voiceSelect");
    sel.innerHTML = "";
    voices.forEach(function(v) {
      var opt = document.createElement("option");
      opt.value = v.id; opt.textContent = v.name;
      sel.appendChild(opt);
    });
  } catch {}
}
function toggleVoice() {
  voiceEnabled = !voiceEnabled;
  document.getElementById("voiceToggle").classList.toggle("active", voiceEnabled);
}
async function playTTS(text, btn) {
  if (currentAudio) { currentAudio.pause(); currentAudio = null; }
  if (btn) btn.classList.add("playing");
  try {
    var r = await fetch(API + "/api/tts", { method: "POST", headers: {"Content-Type":"application/json"}, body: JSON.stringify({text: text.slice(0,5000), voice: document.getElementById("voiceSelect").value}) });
    var blob = await r.blob();
    currentAudio = new Audio(URL.createObjectURL(blob));
    currentAudio.onended = function() { if (btn) btn.classList.remove("playing"); currentAudio = null; };
    currentAudio.play();
  } catch { if (btn) btn.classList.remove("playing"); }
}

// --- Auto Message ---
function toggleAuto() {
  var btn = document.getElementById("autoBtn");
  if (autoTimer) { clearInterval(autoTimer); autoTimer = null; btn.textContent = "Start"; btn.classList.remove("running"); document.getElementById("autoStatus").textContent = ""; return; }
  var msg = document.getElementById("autoMsg").value.trim();
  if (!msg) return;
  var interval = parseInt(document.getElementById("autoInterval").value) * 1000;
  btn.textContent = "Stop"; btn.classList.add("running");
  sendAutoMessage(msg);
  autoTimer = setInterval(function() { sendAutoMessage(msg); }, interval);
  document.getElementById("autoStatus").textContent = "Running";
}
function sendAutoMessage(msg) { if (sending) return; document.getElementById("input").value = msg; send(); }

// --- Music ---
async function loadPlaylistUI() {
  try {
    var r = await fetch(API + "/api/playlist");
    playlist = await r.json();
    renderPlaylist();
  } catch {}
}
function renderPlaylist() {
  var list = document.getElementById("playlistList");
  list.innerHTML = "";
  playlist.forEach(function(p, i) {
    var div = document.createElement("div");
    div.className = "pl-item" + (i === playIndex ? " active" : "");
    div.innerHTML = '<span class="pl-title" title="'+p.title+'">'+p.title+'</span><button class="pl-del" onclick="event.stopPropagation();delMusic(\''+p.url.replace(/'/g,"\\'")+'\')">&times;</button>';
    div.onclick = function() { playMusic(i); };
    list.appendChild(div);
  });
  document.getElementById("plCount").textContent = playlist.length ? playlist.length + " songs" : "";
  var corner = document.getElementById("musicCorner");
  if (playIndex >= 0 && playlist[playIndex]) {
    corner.style.display = "block";
    document.getElementById("musicCornerText").textContent = playlist[playIndex].title;
  }
}
async function addMusic() {
  var urlInput = document.getElementById("musicUrl");
  var url = urlInput.value.trim();
  if (!url) return;
  await fetch(API + "/api/playlist", { method: "POST", headers: {"Content-Type":"application/json"}, body: JSON.stringify({url: url}) });
  urlInput.value = "";
  await loadPlaylistUI();
}
async function delMusic(url) {
  await fetch(API + "/api/playlist", { method: "DELETE", headers: {"Content-Type":"application/json"}, body: JSON.stringify({url: url}) });
  await loadPlaylistUI();
}
function playMusic(index) {
  playIndex = index;
  var item = playlist[index];
  if (!item) return;
  var player = document.getElementById("musicPlayer");
  player.src = item.url;
  player.play().catch(function(){});
  document.getElementById("nowPlaying").textContent = "Now playing: " + item.title;
  document.getElementById("musicCorner").style.display = "block";
  document.getElementById("musicCornerText").textContent = item.title;
  renderPlaylist();
}
function playNext() {
  if (playlist.length === 0) return;
  playIndex = (playIndex + 1) % playlist.length;
  playMusic(playIndex);
}
function toggleMusicPanel() {
  var player = document.getElementById("musicPlayer");
  if (player.paused) { if (playIndex < 0) playMusic(0); else player.play(); }
  else player.pause();
}

// --- Documents ---
async function loadDocs() {
  var r = await fetch(API + "/api/documents");
  var docs = await r.json();
  var list = document.getElementById("docList");
  list.innerHTML = "";
  docs.forEach(function(d) {
    var div = document.createElement("div");
    div.className = "doc-item";
    div.innerHTML = '<span class="source" title="'+d.source+'">'+d.source+'</span><span class="chunks">'+d.chunks+'</span><button class="del" onclick="delDoc(\''+d.source.replace(/'/g,"\\'")+'\')">&times;</button>';
    list.appendChild(div);
  });
}
async function delDoc(source) {
  await fetch(API + "/api/documents", { method: "DELETE", headers: {"Content-Type":"application/json"}, body: JSON.stringify({source:source}) });
  loadDocs();
}
function showModal(type) { closeModals(); document.getElementById(type === "text" ? "textModal" : "urlModal").classList.add("active"); }
function closeModals() { document.querySelectorAll(".modal-overlay").forEach(function(m) { m.classList.remove("active"); }); }
async function addText() {
  var source = document.getElementById("textSource").value || "untitled";
  var text = document.getElementById("textContent").value;
  if (!text) return;
  await fetch(API + "/api/documents", { method: "POST", headers: {"Content-Type":"application/json"}, body: JSON.stringify({source:source,text:text}) });
  document.getElementById("textSource").value = ""; document.getElementById("textContent").value = "";
  closeModals(); loadDocs();
}
async function addUrl() {
  var url = document.getElementById("urlInput").value;
  if (!url) return;
  await fetch(API + "/api/documents/url", { method: "POST", headers: {"Content-Type":"application/json"}, body: JSON.stringify({url:url}) });
  document.getElementById("urlInput").value = "";
  closeModals(); loadDocs();
}

// --- Chat ---
function renderMarkdown(text) {
  return text.replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;")
    .replace(/```([\s\S]*?)```/g,"<pre><code>$1</code></pre>")
    .replace(/`([^`]+)`/g,"<code>$1</code>")
    .replace(/\*\*(.+?)\*\*/g,"<strong>$1</strong>")
    .replace(/\n/g,"<br>");
}

function addMessage(role) {
  var div = document.createElement("div");
  div.className = "message " + role;
  if (role === "assistant") div.prepend(makeAvatar("noe"));
  var content = document.createElement("div");
  content.className = "msg-content";
  var bubble = document.createElement("div");
  bubble.className = "bubble";
  content.appendChild(bubble);
  div.appendChild(content);
  if (role === "user") div.appendChild(makeAvatar("vi"));
  document.getElementById("messages").appendChild(div);
  document.getElementById("messages").scrollTop = 999999;
  return div;
}

async function send() {
  if (sending) return;
  var input = document.getElementById("input");
  var msg = input.value.trim();
  if (!msg) return;
  input.value = ""; input.style.height = "48px";

  var userDiv = addMessage("user");
  userDiv.querySelector(".bubble").innerHTML = renderMarkdown(msg);
  chatHistory.push({ role: "user", content: msg });

  sending = true;
  document.getElementById("sendBtn").disabled = true;

  var msgDiv = addMessage("assistant");
  var msgContent = msgDiv.querySelector(".msg-content");
  var bubble = msgDiv.querySelector(".bubble");
  var thinkingBlock = null;
  var fullText = "";
  var thinkingText = "";
  var sources = [];

  try {
    var r = await fetch(API + "/api/chat", {
      method: "POST", headers: {"Content-Type":"application/json"},
      body: JSON.stringify({
        message: msg,
        model: document.getElementById("modelSelect").value,
        history: chatHistory.slice(-20),
        thinking_budget: parseInt(document.getElementById("thinkingSlider").value)
      })
    });
    var reader = r.body.getReader();
    var decoder = new TextDecoder();
    var buf = "";
    while (true) {
      var chunk = await reader.read();
      if (chunk.done) break;
      buf += decoder.decode(chunk.value, { stream: true });
      var lines = buf.split("\n"); buf = lines.pop();
      for (var line of lines) {
        if (!line.startsWith("data: ")) continue;
        var data = line.slice(6);
        if (data === "[DONE]") break;
        try {
          var parsed = JSON.parse(data);
          if (parsed.sources) { sources = parsed.sources; continue; }
          if (parsed.thinking) {
            if (!thinkingBlock) {
              thinkingBlock = document.createElement("div");
              thinkingBlock.className = "thinking-block";
              thinkingBlock.onclick = function() { this.classList.toggle("collapsed"); };
              msgContent.insertBefore(thinkingBlock, bubble);
            }
            thinkingText += parsed.thinking;
            thinkingBlock.innerHTML = "<span></span>" + renderMarkdown(thinkingText);
          }
          if (parsed.content) {
            fullText += parsed.content;
            bubble.innerHTML = renderMarkdown(fullText);
          }
          document.getElementById("messages").scrollTop = 999999;
        } catch {}
      }
    }
    if (thinkingBlock) thinkingBlock.classList.add("collapsed");
    if (sources.length) {
      var s = document.createElement("div"); s.className = "sources";
      s.innerHTML = "References: " + sources.map(function(src){return '<span>'+src+'</span>';}).join(", ");
      msgContent.appendChild(s);
    }
    if (fullText) {
      var vbtn = document.createElement("button"); vbtn.className = "voice-btn"; vbtn.textContent = "Play voice";
      vbtn.onclick = function() { playTTS(fullText, vbtn); };
      msgContent.appendChild(vbtn);
      if (voiceEnabled) playTTS(fullText);
    }
    chatHistory.push({ role: "assistant", content: fullText });
  } catch (e) {
    bubble.innerHTML = '<span style="color:#f66">'+e.message+'</span>';
  }
  sending = false;
  document.getElementById("sendBtn").disabled = false;
}

document.getElementById("input").addEventListener("input", function() {
  this.style.height = "48px";
  this.style.height = Math.min(this.scrollHeight, 150) + "px";
});

init();
</script>
