<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Noe</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
:root { --bg: #0a0a0a; --surface: #141414; --surface2: #1e1e1e; --border: #2a2a2a; --text: #e8e8e8; --text2: #888; --accent: #c4a0ff; --accent2: #a07ae0; }
body { font-family: -apple-system, "SF Pro", "Helvetica Neue", sans-serif; background: var(--bg); color: var(--text); height: 100vh; display: flex; }

/* Sidebar */
.sidebar { width: 280px; background: var(--surface); border-right: 1px solid var(--border); display: flex; flex-direction: column; flex-shrink: 0; }
.sidebar-header { padding: 20px; border-bottom: 1px solid var(--border); }
.sidebar-header h2 { font-size: 14px; color: var(--text2); text-transform: uppercase; letter-spacing: 1px; margin-bottom: 12px; }
.model-select { width: 100%; padding: 8px 12px; background: var(--surface2); border: 1px solid var(--border); border-radius: 8px; color: var(--text); font-size: 13px; cursor: pointer; outline: none; }
.model-select:focus { border-color: var(--accent); }
.doc-list { flex: 1; overflow-y: auto; padding: 12px; }
.doc-item { display: flex; justify-content: space-between; align-items: center; padding: 10px 12px; background: var(--surface2); border-radius: 8px; margin-bottom: 8px; font-size: 13px; }
.doc-item .source { flex: 1; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; color: var(--text2); }
.doc-item .chunks { color: var(--accent); font-size: 11px; margin: 0 8px; flex-shrink: 0; }
.doc-item .del { background: none; border: none; color: #666; cursor: pointer; font-size: 16px; padding: 0 4px; }
.doc-item .del:hover { color: #f66; }
.doc-actions { padding: 12px; border-top: 1px solid var(--border); }
.doc-actions button { width: 100%; padding: 10px; margin-bottom: 6px; background: var(--surface2); border: 1px solid var(--border); border-radius: 8px; color: var(--text); font-size: 13px; cursor: pointer; transition: all 0.2s; }
.doc-actions button:hover { border-color: var(--accent); color: var(--accent); }

/* Chat */
.chat-area { flex: 1; display: flex; flex-direction: column; }
.chat-header { padding: 16px 24px; border-bottom: 1px solid var(--border); display: flex; align-items: center; gap: 12px; }
.chat-header .logo { font-size: 20px; font-weight: 700; color: var(--accent); }
.chat-header .status { font-size: 12px; color: var(--text2); }
.messages { flex: 1; overflow-y: auto; padding: 24px; }
.message { max-width: 720px; margin: 0 auto 20px; }
.message.user { display: flex; justify-content: flex-end; }
.message.user .bubble { background: var(--accent2); color: #fff; border-radius: 18px 18px 4px 18px; padding: 12px 18px; max-width: 70%; }
.message.assistant .bubble { background: var(--surface2); border-radius: 18px 18px 18px 4px; padding: 16px 20px; line-height: 1.7; max-width: 85%; }
.message .sources { font-size: 11px; color: var(--text2); margin-top: 8px; padding: 8px 12px; background: var(--surface); border-radius: 8px; }
.message .sources span { color: var(--accent); }
.typing { display: inline-block; }
.typing::after { content: ""; animation: blink 1s infinite; }
@keyframes blink { 0%,100% { opacity: 1; } 50% { opacity: 0.3; } }

/* Input */
.input-area { padding: 16px 24px; border-top: 1px solid var(--border); }
.input-wrap { max-width: 720px; margin: 0 auto; display: flex; gap: 12px; }
.input-wrap textarea { flex: 1; padding: 14px 18px; background: var(--surface2); border: 1px solid var(--border); border-radius: 12px; color: var(--text); font-size: 14px; font-family: inherit; resize: none; outline: none; height: 50px; max-height: 150px; }
.input-wrap textarea:focus { border-color: var(--accent); }
.input-wrap button { padding: 0 20px; background: var(--accent2); border: none; border-radius: 12px; color: #fff; font-size: 14px; cursor: pointer; transition: opacity 0.2s; flex-shrink: 0; }
.input-wrap button:hover { opacity: 0.85; }
.input-wrap button:disabled { opacity: 0.4; cursor: not-allowed; }

/* Modal */
.modal-overlay { display: none; position: fixed; top: 0; left: 0; right: 0; bottom: 0; background: rgba(0,0,0,0.6); z-index: 100; align-items: center; justify-content: center; }
.modal-overlay.active { display: flex; }
.modal { background: var(--surface); border: 1px solid var(--border); border-radius: 16px; padding: 24px; width: 420px; max-width: 90vw; }
.modal h3 { margin-bottom: 16px; font-size: 16px; }
.modal input, .modal textarea { width: 100%; padding: 10px 14px; background: var(--surface2); border: 1px solid var(--border); border-radius: 8px; color: var(--text); font-size: 13px; font-family: inherit; outline: none; margin-bottom: 12px; }
.modal textarea { height: 180px; resize: vertical; }
.modal input:focus, .modal textarea:focus { border-color: var(--accent); }
.modal-btns { display: flex; gap: 8px; justify-content: flex-end; }
.modal-btns button { padding: 8px 20px; border-radius: 8px; border: 1px solid var(--border); background: var(--surface2); color: var(--text); cursor: pointer; font-size: 13px; }
.modal-btns .primary { background: var(--accent2); border-color: var(--accent2); color: #fff; }

/* Markdown-ish */
.bubble p { margin-bottom: 8px; }
.bubble code { background: var(--bg); padding: 2px 6px; border-radius: 4px; font-size: 12px; }
.bubble pre { background: var(--bg); padding: 12px; border-radius: 8px; overflow-x: auto; margin: 8px 0; }
.bubble pre code { background: none; padding: 0; }

@media (max-width: 768px) {
  .sidebar { display: none; }
  body { flex-direction: column; }
}
</style>
</head>
<body>

<div class="sidebar">
  <div class="sidebar-header">
    <h2>Model</h2>
    <select class="model-select" id="modelSelect"></select>
    <h2 style="margin-top:16px">Knowledge Base</h2>
  </div>
  <div class="doc-list" id="docList"></div>
  <div class="doc-actions">
    <button onclick="showModal('text')">+ Add Text</button>
    <button onclick="showModal('url')">+ Add URL</button>
  </div>
</div>

<div class="chat-area">
  <div class="chat-header">
    <div class="logo">Noe</div>
    <div class="status" id="status">Ready</div>
  </div>
  <div class="messages" id="messages"></div>
  <div class="input-area">
    <div class="input-wrap">
      <textarea id="input" placeholder="Say something..." rows="1" onkeydown="if(event.key==='Enter'&&!event.shiftKey){event.preventDefault();send()}"></textarea>
      <button id="sendBtn" onclick="send()">Send</button>
    </div>
  </div>
</div>

<!-- Text Modal -->
<div class="modal-overlay" id="textModal">
  <div class="modal">
    <h3>Add Text Document</h3>
    <input id="textSource" placeholder="Document name (e.g. notes.txt)">
    <textarea id="textContent" placeholder="Paste your text here..."></textarea>
    <div class="modal-btns">
      <button onclick="closeModals()">Cancel</button>
      <button class="primary" onclick="addText()">Add</button>
    </div>
  </div>
</div>

<!-- URL Modal -->
<div class="modal-overlay" id="urlModal">
  <div class="modal">
    <h3>Add URL Document</h3>
    <input id="urlInput" placeholder="https://example.com/article">
    <div class="modal-btns">
      <button onclick="closeModals()">Cancel</button>
      <button class="primary" onclick="addUrl()">Fetch & Add</button>
    </div>
  </div>
</div>

<script>
var API = window.location.origin;
var history = [];
var sending = false;

// Init
async function init() {
  var r = await fetch(API + "/api/models");
  var models = await r.json();
  var sel = document.getElementById("modelSelect");
  models.forEach(function(m) {
    var opt = document.createElement("option");
    opt.value = m.id; opt.textContent = m.name;
    sel.appendChild(opt);
  });
  loadDocs();
}

async function loadDocs() {
  var r = await fetch(API + "/api/documents");
  var docs = await r.json();
  var list = document.getElementById("docList");
  list.innerHTML = "";
  docs.forEach(function(d) {
    var div = document.createElement("div");
    div.className = "doc-item";
    div.innerHTML = '<span class="source" title="' + d.source + '">' + d.source + '</span><span class="chunks">' + d.chunks + ' chunks</span><button class="del" onclick="delDoc(\'' + d.source.replace(/'/g, "\\'") + '\')">&times;</button>';
    list.appendChild(div);
  });
}

async function delDoc(source) {
  await fetch(API + "/api/documents", { method: "DELETE", headers: { "Content-Type": "application/json" }, body: JSON.stringify({ source: source }) });
  loadDocs();
}

function showModal(type) {
  closeModals();
  document.getElementById(type === "text" ? "textModal" : "urlModal").classList.add("active");
}
function closeModals() {
  document.querySelectorAll(".modal-overlay").forEach(function(m) { m.classList.remove("active"); });
}

async function addText() {
  var source = document.getElementById("textSource").value || "untitled";
  var text = document.getElementById("textContent").value;
  if (!text) return;
  await fetch(API + "/api/documents", { method: "POST", headers: { "Content-Type": "application/json" }, body: JSON.stringify({ source: source, text: text }) });
  document.getElementById("textSource").value = "";
  document.getElementById("textContent").value = "";
  closeModals();
  loadDocs();
}

async function addUrl() {
  var url = document.getElementById("urlInput").value;
  if (!url) return;
  document.getElementById("status").textContent = "Fetching...";
  await fetch(API + "/api/documents/url", { method: "POST", headers: { "Content-Type": "application/json" }, body: JSON.stringify({ url: url }) });
  document.getElementById("urlInput").value = "";
  document.getElementById("status").textContent = "Ready";
  closeModals();
  loadDocs();
}

function addMessage(role, content, sources) {
  var div = document.createElement("div");
  div.className = "message " + role;
  var bubble = document.createElement("div");
  bubble.className = "bubble";
  bubble.innerHTML = renderMarkdown(content);
  div.appendChild(bubble);
  if (sources && sources.length) {
    var s = document.createElement("div");
    s.className = "sources";
    s.innerHTML = "References: " + sources.map(function(src) { return '<span>' + src + '</span>'; }).join(", ");
    div.appendChild(s);
  }
  document.getElementById("messages").appendChild(div);
  document.getElementById("messages").scrollTop = 999999;
  return bubble;
}

function renderMarkdown(text) {
  return text
    .replace(/&/g, "&amp;").replace(/</g, "&lt;").replace(/>/g, "&gt;")
    .replace(/```([\s\S]*?)```/g, "<pre><code>$1</code></pre>")
    .replace(/`([^`]+)`/g, "<code>$1</code>")
    .replace(/\*\*(.+?)\*\*/g, "<strong>$1</strong>")
    .replace(/\n/g, "<br>");
}

async function send() {
  if (sending) return;
  var input = document.getElementById("input");
  var msg = input.value.trim();
  if (!msg) return;
  input.value = "";
  input.style.height = "50px";

  addMessage("user", msg);
  history.push({ role: "user", content: msg });

  sending = true;
  document.getElementById("sendBtn").disabled = true;
  document.getElementById("status").textContent = "Thinking...";

  var bubble = addMessage("assistant", "");
  var fullText = "";
  var sources = [];

  try {
    var r = await fetch(API + "/api/chat", {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify({ message: msg, model: document.getElementById("modelSelect").value, history: history.slice(-20) })
    });

    var reader = r.body.getReader();
    var decoder = new TextDecoder();
    var buf = "";

    while (true) {
      var chunk = await reader.read();
      if (chunk.done) break;
      buf += decoder.decode(chunk.value, { stream: true });
      var lines = buf.split("\n");
      buf = lines.pop();
      for (var line of lines) {
        if (!line.startsWith("data: ")) continue;
        var data = line.slice(6);
        if (data === "[DONE]") break;
        try {
          var parsed = JSON.parse(data);
          if (parsed.sources) { sources = parsed.sources; continue; }
          if (parsed.content) {
            fullText += parsed.content;
            bubble.innerHTML = renderMarkdown(fullText);
            document.getElementById("messages").scrollTop = 999999;
          }
        } catch {}
      }
    }

    if (sources.length) {
      var s = document.createElement("div");
      s.className = "sources";
      s.innerHTML = "References: " + sources.map(function(src) { return '<span>' + src + '</span>'; }).join(", ");
      bubble.parentElement.appendChild(s);
    }

    history.push({ role: "assistant", content: fullText });
  } catch (e) {
    bubble.innerHTML = '<span style="color:#f66">Error: ' + e.message + '</span>';
  }

  sending = false;
  document.getElementById("sendBtn").disabled = false;
  document.getElementById("status").textContent = "Ready";
}

// Auto-resize textarea
document.getElementById("input").addEventListener("input", function() {
  this.style.height = "50px";
  this.style.height = Math.min(this.scrollHeight, 150) + "px";
});

init();
</script>
</body>
</html>
