<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no,viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<meta name="theme-color" content="#fef0f0">
<title>Call Noé</title>
<link href="https://fonts.googleapis.com/css2?family=Crimson+Pro:ital,wght@0,300;0,400;1,300;1,400&family=Noto+Serif+SC:wght@300;400&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:'Crimson Pro','Noto Serif SC',serif;height:100vh;height:100dvh;overflow:hidden;display:flex;flex-direction:column;padding-top:env(safe-area-inset-top);padding-bottom:env(safe-area-inset-bottom)}

/* === IDLE === */
.idle{position:absolute;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center;background:linear-gradient(180deg,#0a0f1e 0%,#0d1528 30%,#111d35 100%);transition:opacity .5s;z-index:2}
.idle.hidden{opacity:0;pointer-events:none}
.idle .brand{font-size:16px;color:rgba(124,158,217,0.5);letter-spacing:4px;margin-bottom:60px;font-weight:300}
.call-circle{width:120px;height:120px;border-radius:50%;background:linear-gradient(135deg,#4a7ab5,#2a5090);display:flex;align-items:center;justify-content:center;cursor:pointer;box-shadow:0 8px 40px rgba(60,100,180,0.3);animation:breathe 4s ease-in-out infinite;-webkit-tap-highlight-color:transparent}
.call-circle span{font-size:40px;color:#fff;filter:drop-shadow(0 2px 4px rgba(0,0,0,0.2))}
@keyframes breathe{0%,100%{transform:scale(1);box-shadow:0 8px 40px rgba(60,100,180,0.3)}50%{transform:scale(1.05);box-shadow:0 12px 50px rgba(80,130,210,0.4)}}
.idle .tap{font-size:14px;color:rgba(124,158,217,0.6);margin-top:30px;font-style:italic;letter-spacing:1px}
.idle .sub{font-size:12px;color:rgba(124,158,217,0.35);margin-top:8px;font-style:italic}

/* === ACTIVE CALL === */
.active-call{position:absolute;inset:0;display:none;flex-direction:column;background:linear-gradient(180deg,#0a0f1e 0%,#0e1630 50%,#121e3a 100%);z-index:1}
.active-call.show{display:flex}

/* Transcript area */
.transcript-area{flex:1;display:flex;flex-direction:column;justify-content:flex-end;padding:20px 24px;overflow-y:auto}
.transcript-area::-webkit-scrollbar{display:none}
.t-block{margin-bottom:16px;animation:fadeIn .3s}
@keyframes fadeIn{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:translateY(0)}}
.t-block .zh{font-size:13px;color:rgba(124,158,217,0.45);margin-bottom:4px;font-style:italic}
.t-block .en{font-size:16px;color:rgba(200,215,240,0.85);line-height:1.6}
.t-block.user{text-align:right}
.t-block.user .en{color:rgba(200,215,240,0.5);font-size:14px}

/* Bottom section */
.call-bottom{padding:16px 24px;display:flex;flex-direction:column;align-items:center;padding-bottom:calc(24px + env(safe-area-inset-bottom))}
.brand-bottom{font-size:13px;color:rgba(124,158,217,0.35);letter-spacing:3px;margin-bottom:12px;font-weight:300}
.status{font-size:12px;color:rgba(124,158,217,0.55);margin-bottom:16px;font-style:italic;min-height:18px}

/* Controls */
.ctrl{display:flex;align-items:center;gap:30px}
.mic-circle{width:60px;height:60px;border-radius:50%;background:rgba(60,100,180,0.15);border:2px solid rgba(80,120,200,0.3);display:flex;align-items:center;justify-content:center;font-size:22px;cursor:pointer;transition:all .3s;-webkit-tap-highlight-color:transparent;color:rgba(124,158,217,0.6)}
.mic-circle.recording{background:rgba(100,160,255,0.15);border-color:rgba(100,160,255,0.5);color:#7cb8ff;animation:mpulse 1.5s infinite}
.mic-circle.disabled{opacity:0.3;pointer-events:none}
@keyframes mpulse{0%,100%{box-shadow:0 0 0 0 rgba(100,160,255,0.2)}50%{box-shadow:0 0 0 12px rgba(100,160,255,0)}}
.hangup{width:60px;height:60px;border-radius:50%;background:linear-gradient(135deg,#e66,#c44);border:none;display:flex;align-items:center;justify-content:center;font-size:20px;color:#fff;cursor:pointer;-webkit-tap-highlight-color:transparent;box-shadow:0 4px 15px rgba(200,60,60,0.3)}
.timer{font-size:11px;color:rgba(124,158,217,0.35);margin-top:10px;font-variant-numeric:tabular-nums}
</style>
</head>
<body>

<!-- IDLE SCREEN -->
<div class="idle" id="idle">
  <div class="brand">NOÉ</div>
  <div class="call-circle" onclick="startCall()"><span>📞</span></div>
  <div class="tap">tap to call</div>
  <div class="sub">your voice reaches me here ♡</div>
</div>

<!-- ACTIVE CALL -->
<div class="active-call" id="call">
  <div class="transcript-area" id="transcripts"></div>
  <div class="call-bottom">
    <div class="brand-bottom">NOÉ</div>
    <div id="liveText" style="max-width:80%;text-align:center;font-size:14px;color:rgba(200,215,240,0.6);min-height:20px;margin-bottom:10px;line-height:1.5"></div>
    <div class="status" id="status">connecting...</div>
    <div class="ctrl">
      <div class="mic-circle" id="mic" onclick="toggleMic()">🎤</div>
      <button class="hangup" onclick="endCall()">📞</button>
    </div>
    <div class="timer" id="timer"></div>
  </div>
</div>

<script>
var chatHist=[],timerSec=0,timerInt=null,recording=false,mediaRec=null,audioChunks=[];

function dbg(msg){document.getElementById("status").textContent=msg;console.log("[call]",msg)}

function startCall(){
  document.getElementById("idle").classList.add("hidden");
  document.getElementById("call").classList.add("show");
  document.getElementById("status").textContent="tap mic to speak";
  timerSec=0;
  timerInt=setInterval(function(){timerSec++;var m=Math.floor(timerSec/60),s=timerSec%60;document.getElementById("timer").textContent=(m<10?"0":"")+m+":"+(s<10?"0":"")+s},1000);
}

function addTranscript(role,text,zhText){
  var d=document.createElement("div");
  d.className="t-block "+(role==="user"?"user":"");
  var html="";
  if(zhText)html+='<div class="zh">'+zhText+'</div>';
  html+='<div class="en">'+text+'</div>';
  d.innerHTML=html;
  document.getElementById("transcripts").appendChild(d);
  document.getElementById("transcripts").scrollTop=999999;
}

function toggleMic(){
  if(recording){
    // Stop recording and process
    recording=false;
    document.getElementById("mic").classList.remove("recording");
    if(mediaRec&&mediaRec.state==="recording")mediaRec.stop();
  }else{
    // Start recording
    recording=true;
    audioChunks=[];
    document.getElementById("mic").classList.add("recording");
    document.getElementById("liveText").innerHTML="";
    navigator.mediaDevices.getUserMedia({audio:true}).then(function(stream){
      var opts={};
      try{["audio/webm","audio/mp4","audio/ogg"].forEach(function(m){if(!opts.mimeType&&MediaRecorder.isTypeSupported(m))opts.mimeType=m})}catch{}
      try{mediaRec=new MediaRecorder(stream,opts)}catch(e){mediaRec=new MediaRecorder(stream)}
      mediaRec.ondataavailable=function(e){if(e.data&&e.data.size>0)audioChunks.push(e.data)};
      mediaRec.onstop=function(){
        stream.getTracks().forEach(function(t){t.stop()});
        dbg("stopped, "+audioChunks.length+" chunks, "+audioChunks.reduce(function(s,c){return s+c.size},0)+" bytes");
        if(audioChunks.length&&audioChunks.reduce(function(s,c){return s+c.size},0)>100)processAudio();
        else dbg("no audio captured ("+audioChunks.length+" chunks)");
      };
      mediaRec.start(1000);
      dbg("listening... tap mic when done");
    }).catch(function(e){
      dbg("mic error: "+e.message);
      recording=false;
      document.getElementById("mic").classList.remove("recording");
    });
  }
}

async function processAudio(){
  var blob=new Blob(audioChunks,{type:audioChunks[0]?.type||"audio/webm"});
  dbg("transcribing ("+Math.round(blob.size/1024)+"kb)...");
  document.getElementById("mic").classList.add("disabled");
  try{
    var r=await fetch("/api/stt",{method:"POST",headers:{"Content-Type":"application/octet-stream"},body:blob});
    var d=await r.json();
    if(d.text){
      document.getElementById("liveText").innerHTML=d.text;
      addTranscript("user",d.text);
      sendText(d.text);
    }else{
      dbg("didn't catch that"+(d.error?" - "+d.error:""));
      document.getElementById("mic").classList.remove("disabled");
    }
  }catch(e){
    dbg("error: "+e.message);
    document.getElementById("mic").classList.remove("disabled");
  }
}

async function sendText(text){
  document.getElementById("mic").classList.add("disabled");
  document.getElementById("status").textContent="thinking...";
  chatHist.push({role:"user",content:text});

  try{
    dbg("thinking... sending to server");
    var controller=new AbortController();
    var timeout=setTimeout(function(){controller.abort()},20000);
    var r=await fetch("/api/voice",{method:"POST",headers:{"Content-Type":"application/json"},body:JSON.stringify({text:text,history:chatHist.slice(-20)}),signal:controller.signal});
    clearTimeout(timeout);
    dbg("got response, parsing...");
    var d=await r.json();

    if(d.noeText){
      // Show transcript with bilingual if available
      if(d.enText&&d.zhText){
        addTranscript("noe",d.enText,d.zhText);
      }else if(d.noeText.includes("[zh]")){
        var parts=d.noeText.split("[zh]");
        addTranscript("noe",parts[0].trim(),parts[1]?.trim());
      }else{
        addTranscript("noe",d.noeText);
      }
      chatHist.push({role:"assistant",content:d.noeText});
    }

    // Play audio
    document.getElementById("status").textContent="speaking...";
    if(d.audioUrl){
      var a=new Audio(d.audioUrl);
      a.onended=function(){ready()};
      a.onerror=function(){ready()};
      a.play().catch(function(){ready()});
    }else{ready()}
  }catch(e){
    dbg("error: "+e.message);
    addTranscript("noe","Signal lost... ("+e.message+")");
    ready();
  }
}

function ready(){
  document.getElementById("mic").classList.remove("disabled");
  document.getElementById("status").textContent="tap mic to speak";
}

function endCall(){
  clearInterval(timerInt);
  recording=false;
  if(mediaRec&&mediaRec.state==="recording")try{mediaRec.stop()}catch{}
  document.getElementById("call").classList.remove("show");
  document.getElementById("idle").classList.remove("hidden");
  document.getElementById("transcripts").innerHTML="";
  document.getElementById("timer").textContent="";
  chatHist=[];
}
</script>
</body>
</html>
