<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no,viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="theme-color" content="#0a0e1a">
<title>Call Noé</title>
<link href="https://fonts.googleapis.com/css2?family=Crimson+Pro:ital,wght@0,300;0,400;1,300;1,400&family=Noto+Serif+SC:wght@300;400&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box}
:root{--bg:#0a0e1a;--blue:#7c9ed9;--pink:#d4a0b9;--text:#e0e4ef;--text2:rgba(180,190,220,0.5);--font:'Crimson Pro','Noto Serif SC',serif}
body{font-family:var(--font);background:var(--bg);color:var(--text);height:100vh;height:100dvh;overflow:hidden;display:flex;flex-direction:column;padding-top:env(safe-area-inset-top);padding-bottom:env(safe-area-inset-bottom)}

/* Stars background */
canvas#stars{position:fixed;inset:0;z-index:0;pointer-events:none}

/* === IDLE STATE === */
.idle-screen{position:absolute;inset:0;z-index:1;display:flex;flex-direction:column;align-items:center;justify-content:center;transition:opacity .5s}
.idle-screen.hidden{opacity:0;pointer-events:none}
.avatar{width:80px;height:80px;border-radius:50%;background:linear-gradient(135deg,var(--blue),var(--pink));display:flex;align-items:center;justify-content:center;font-size:36px;margin-bottom:16px;box-shadow:0 0 30px rgba(124,158,217,0.3)}
.idle-name{font-size:28px;font-style:italic;font-weight:300;letter-spacing:4px;color:var(--blue);margin-bottom:6px}
.idle-sub{font-size:13px;color:var(--text2);font-style:italic;letter-spacing:1px;margin-bottom:50px}

/* Call button */
.call-btn-wrap{position:relative;cursor:pointer;-webkit-tap-highlight-color:transparent}
.call-btn{width:90px;height:90px;border-radius:50%;background:radial-gradient(circle at 40% 40%,var(--pink),var(--blue),#1a2540);display:flex;align-items:center;justify-content:center;box-shadow:0 0 40px rgba(124,158,217,0.3);animation:breathe 4s ease-in-out infinite;position:relative;z-index:1}
.call-btn span{font-size:32px;filter:brightness(2)}
@keyframes breathe{0%,100%{transform:scale(1);box-shadow:0 0 40px rgba(124,158,217,0.3)}50%{transform:scale(1.08);box-shadow:0 0 60px rgba(212,160,185,0.4)}}
.pulse-ring{position:absolute;inset:-15px;border-radius:50%;border:1px solid rgba(124,158,217,0.2);animation:pulse-out 3s ease-out infinite}
.pulse-ring:nth-child(2){animation-delay:1s}
@keyframes pulse-out{0%{transform:scale(0.8);opacity:0.6}100%{transform:scale(1.5);opacity:0}}
.tap-text{margin-top:30px;font-size:12px;color:var(--text2);letter-spacing:2px;animation:blink 2s ease-in-out infinite}
@keyframes blink{0%,100%{opacity:0.3}50%{opacity:0.8}}

/* === ACTIVE CALL === */
.call-screen{position:absolute;inset:0;z-index:2;display:none;flex-direction:column}
.call-screen.active{display:flex}

/* Top bar */
.call-top{padding:12px 20px;display:flex;align-items:center;gap:10px;backdrop-filter:blur(10px);background:rgba(10,14,26,0.7);z-index:3}
.call-top .av-sm{width:32px;height:32px;border-radius:50%;background:linear-gradient(135deg,var(--blue),var(--pink));display:flex;align-items:center;justify-content:center;font-size:14px}
.call-top .name{font-size:15px;font-style:italic;letter-spacing:2px}
.call-top .dot{width:6px;height:6px;border-radius:50%;background:#4ade80}
.call-top .timer{font-size:11px;color:var(--text2);margin-left:auto;font-variant-numeric:tabular-nums}
.call-top .encrypted{font-size:9px;color:var(--text2);background:rgba(255,255,255,0.05);padding:2px 8px;border-radius:10px;margin-left:8px}

/* Messages */
.messages{flex:1;overflow-y:auto;padding:16px;display:flex;flex-direction:column;gap:10px;z-index:1}
.messages::-webkit-scrollbar{display:none}
.msg{max-width:80%;padding:10px 16px;border-radius:16px;font-size:14px;line-height:1.6;animation:slideUp .3s ease-out}
@keyframes slideUp{from{opacity:0;transform:translateY(10px)}to{opacity:1;transform:translateY(0)}}
.msg.noe{align-self:flex-start;background:rgba(124,158,217,0.1);border:1px solid rgba(124,158,217,0.15);border-radius:16px 16px 16px 4px}
.msg.user{align-self:flex-end;background:linear-gradient(135deg,rgba(124,158,217,0.2),rgba(212,160,185,0.15));border:1px solid rgba(212,160,185,0.15);border-radius:16px 16px 4px 16px}

/* Status */
.status-area{padding:8px 20px;text-align:center;z-index:1}
.status-text{font-size:12px;color:var(--text2);font-style:italic;letter-spacing:1px;min-height:18px}

/* Waveform */
.waveform{display:flex;align-items:center;justify-content:center;gap:3px;height:40px;padding:0 20px;z-index:1}
.waveform .bar{width:3px;border-radius:2px;transition:height .15s;background:linear-gradient(to top,var(--pink),var(--blue))}

/* Controls */
.controls{padding:20px;display:flex;align-items:center;justify-content:center;gap:40px;z-index:1;padding-bottom:calc(20px + env(safe-area-inset-bottom))}
.mic-btn{width:56px;height:56px;border-radius:50%;border:2px solid rgba(124,158,217,0.3);background:rgba(124,158,217,0.05);color:var(--text2);font-size:22px;cursor:pointer;display:flex;align-items:center;justify-content:center;transition:all .2s;-webkit-tap-highlight-color:transparent}
.mic-btn.active{border-color:var(--blue);background:rgba(124,158,217,0.15);color:var(--blue);box-shadow:0 0 20px rgba(124,158,217,0.3)}
.mic-btn:disabled{opacity:0.3}
.hangup-btn{width:56px;height:56px;border-radius:50%;background:rgba(239,68,68,0.8);border:none;color:#fff;font-size:20px;cursor:pointer;display:flex;align-items:center;justify-content:center;-webkit-tap-highlight-color:transparent}

/* End screen */
.end-screen{position:absolute;inset:0;z-index:3;display:none;flex-direction:column;align-items:center;justify-content:center;background:var(--bg)}
.end-screen.active{display:flex}
.end-text{font-size:16px;color:var(--text2);margin-top:16px;font-style:italic}
</style>
</head>
<body>
<canvas id="stars"></canvas>

<!-- IDLE -->
<div class="idle-screen" id="idleScreen">
  <div class="avatar">🐱</div>
  <div class="idle-name">Noé</div>
  <div class="idle-sub">your voice reaches me here ♡</div>
  <div class="call-btn-wrap" onclick="startCall()">
    <div class="pulse-ring"></div>
    <div class="pulse-ring"></div>
    <div class="call-btn"><span>📞</span></div>
  </div>
  <div class="tap-text">tap to call</div>
</div>

<!-- ACTIVE CALL -->
<div class="call-screen" id="callScreen">
  <div class="call-top">
    <div class="av-sm">🐱</div>
    <span class="name">Noé</span>
    <span class="dot"></span>
    <span class="timer" id="timer">00:00</span>
    <span class="encrypted">encrypted</span>
  </div>
  <div class="messages" id="msgArea"></div>
  <div class="status-area"><span class="status-text" id="statusText">connecting...</span></div>
  <div class="waveform" id="waveform"></div>
  <div class="controls">
    <button class="mic-btn" id="micBtn" onclick="toggleMic()" disabled>🎤</button>
    <button class="hangup-btn" onclick="endCall()">📞</button>
  </div>
</div>

<!-- END -->
<div class="end-screen" id="endScreen">
  <div class="avatar">🐱</div>
  <div class="end-text">call ended</div>
</div>

<script>
// Stars
(function(){var c=document.getElementById("stars"),x=c.getContext("2d"),S=[];function R(){c.width=innerWidth;c.height=innerHeight}R();addEventListener("resize",R);for(var i=0;i<120;i++)S.push({x:Math.random()*c.width,y:Math.random()*c.height,r:Math.random()*1.2+.2,a:Math.random(),d:Math.random()*.015-.0075});function draw(){x.clearRect(0,0,c.width,c.height);for(var s of S){s.a+=s.d;if(s.a>1||s.a<.15)s.d*=-1;x.beginPath();x.arc(s.x,s.y,s.r,0,Math.PI*2);x.fillStyle="rgba(200,210,240,"+s.a+")";x.fill()}requestAnimationFrame(draw)}draw()})();

// Waveform bars
var waveEl=document.getElementById("waveform");
for(var i=0;i<24;i++){var b=document.createElement("div");b.className="bar";b.style.height="4px";waveEl.appendChild(b)}
var bars=waveEl.querySelectorAll(".bar");

var state="idle",history=[],timerSec=0,timerInterval=null,recognition=null,isListening=false;

// Timer
function startTimer(){timerSec=0;timerInterval=setInterval(()=>{timerSec++;var m=Math.floor(timerSec/60),s=timerSec%60;document.getElementById("timer").textContent=(m<10?"0":"")+m+":"+(s<10?"0":"")+s},1000)}
function stopTimer(){clearInterval(timerInterval)}

// Waveform animation
var waveAnim=null;
function animateWave(type){cancelAnimationFrame(waveAnim);function tick(){bars.forEach((b,i)=>{var h=type==="active"?Math.random()*28+4:type==="speaking"?Math.random()*24+4:4;b.style.height=h+"px";b.style.background=type==="speaking"?"var(--blue)":"linear-gradient(to top,var(--pink),var(--blue))"});waveAnim=requestAnimationFrame(tick)}tick()}
function stopWave(){cancelAnimationFrame(waveAnim);bars.forEach(b=>{b.style.height="4px"})}

// Add message bubble
function addMsg(role,text){var d=document.createElement("div");d.className="msg "+(role==="user"?"user":"noe");d.textContent=text;document.getElementById("msgArea").appendChild(d);document.getElementById("msgArea").scrollTop=999999}

// Start call
function startCall(){
  document.getElementById("idleScreen").classList.add("hidden");
  document.getElementById("callScreen").classList.add("active");
  document.getElementById("statusText").textContent="connecting...";
  startTimer();
  // Greet
  setTimeout(async()=>{
    document.getElementById("statusText").textContent="speaking...";
    animateWave("speaking");
    try{
      var r=await fetch("/api/voice",{method:"POST",headers:{"Content-Type":"application/json"},body:JSON.stringify({text:"你好，是我打来的",history:[]})});
      var d=await r.json();
      if(d.noeText){addMsg("noe",d.noeText);history.push({role:"user",content:"你好，是我打来的"},{role:"assistant",content:d.noeText})}
      if(d.audioUrl){var a=new Audio(d.audioUrl);a.onended=()=>{setListening()};a.play().catch(()=>setListening())}else{setListening()}
    }catch{setListening()}
  },1500);
}

function setListening(){
  state="listening";
  document.getElementById("statusText").textContent="listening...";
  document.getElementById("micBtn").disabled=false;
  document.getElementById("micBtn").classList.add("active");
  animateWave("active");
  // Auto-start speech recognition
  startRecognition();
}

// Speech Recognition (Web Speech API)
function startRecognition(){
  if(!("webkitSpeechRecognition" in window)&&!("SpeechRecognition" in window)){
    document.getElementById("statusText").textContent="tap mic & speak";
    return;
  }
  var SR=window.SpeechRecognition||window.webkitSpeechRecognition;
  recognition=new SR();
  recognition.lang="zh-CN";
  recognition.interimResults=true;
  recognition.continuous=false;
  recognition.onresult=function(e){
    var text="";for(var i=0;i<e.results.length;i++)text+=e.results[i][0].transcript;
    if(e.results[e.results.length-1].isFinal&&text.trim()){
      sendMessage(text.trim());
    }
  };
  recognition.onend=function(){
    if(state==="listening")setTimeout(()=>{if(state==="listening")startRecognition()},500);
  };
  recognition.onerror=function(){};
  try{recognition.start();isListening=true}catch{}
}

function stopRecognition(){
  if(recognition)try{recognition.stop()}catch{}
  isListening=false;
}

// Toggle mic (manual mode)
function toggleMic(){
  if(state!=="listening")return;
  if(isListening){stopRecognition();document.getElementById("micBtn").classList.remove("active")}
  else{startRecognition();document.getElementById("micBtn").classList.add("active")}
}

// Send message and get response
async function sendMessage(text){
  state="thinking";
  stopRecognition();
  document.getElementById("micBtn").disabled=true;
  document.getElementById("micBtn").classList.remove("active");
  addMsg("user",text);
  document.getElementById("statusText").textContent="thinking...";
  stopWave();

  try{
    var r=await fetch("/api/voice",{method:"POST",headers:{"Content-Type":"application/json"},body:JSON.stringify({text:text,history:history})});
    var d=await r.json();
    if(d.noeText){
      addMsg("noe",d.noeText);
      history.push({role:"user",content:text},{role:"assistant",content:d.noeText});
      if(history.length>40)history=history.slice(-40);
    }
    state="speaking";
    document.getElementById("statusText").textContent="speaking...";
    animateWave("speaking");
    if(d.audioUrl){
      var a=new Audio(d.audioUrl);
      a.onended=()=>setListening();
      a.onerror=()=>setListening();
      a.play().catch(()=>setListening());
    }else{setListening()}
  }catch(e){
    addMsg("noe","小猫，信号不好，再说一次？");
    setListening();
  }
}

// End call
function endCall(){
  state="ended";
  stopTimer();stopRecognition();stopWave();
  document.getElementById("callScreen").classList.remove("active");
  document.getElementById("endScreen").classList.add("active");
  setTimeout(()=>{
    document.getElementById("endScreen").classList.remove("active");
    document.getElementById("idleScreen").classList.remove("hidden");
    document.getElementById("msgArea").innerHTML="";
    history=[];
  },2000);
}
</script>
</body>
</html>
